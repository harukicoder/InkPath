name: Daily news brief

on:
  schedule:
    # Runs at 23:30 UTC (07:30 Beijing time) every day.
    - cron: "30 23 * * *"
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk@^0.30.0

      - name: Generate today's brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-daily-news.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet data/daily-news.js; then
            echo "No changes."
            exit 0
          fi
          git config user.name "inkpath-news-bot"
          git config user.email "noreply@github.com"
          git add data/daily-news.js
          git commit -m "news: daily brief $(date -u +%Y-%m-%d)"
          git push
